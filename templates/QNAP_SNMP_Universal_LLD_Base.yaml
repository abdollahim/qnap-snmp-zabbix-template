zabbix_export:
  version: "7.4"

  template_groups:
    - uuid: f2587d2720d6454eaea6f1aafb3d1c06
      name: "Templates/Network devices"

  hosts: []

  templates:
    - uuid: 605f422e65104122b30db8c336da0a16
      template: "QNAP NAS LLD SNMP"
      name: "QNAP NAS LLD SNMP v0.2.0"
      description: |
        Production‑ready SNMP Low‑Level Discovery (LLD) template for QNAP NAS storage devices.
        Version: 0.2.0
        Author: Majid Abdollahi

        This template provides complete, multi‑layer monitoring coverage for QNAP NAS systems using
        native SNMP OIDs, with full automatic discovery of disks, RAID groups, storage pools, volumes,
        fans, temperature sensors, PSUs, UPS units, and system health indicators. It is fully aligned
        with the Zabbix 7.4 YAML schema and validated for compatibility with Zabbix 8.x.

        Core Features:
          • Automatic discovery of all major QNAP hardware components (HDDs, RAID groups, pools,
            volumes, fans, PSUs, UPS, temperature sensors, system health modules)
          • Real‑time monitoring of CPU, memory, uptime, firmware version, SNMP agent availability,
            and system identity
          • Storage‑focused metrics including capacity, free space, utilization percentage, and
            temperature for each disk, pool, and volume
          • RAID group status monitoring with valuemap‑based state interpretation
          • Fan speed and health monitoring with alarm‑state mapping
          • Temperature sensor discovery with per‑sensor thresholds and alerting
          • UPS and PSU health monitoring for enterprise‑grade reliability

        Advanced Monitoring:
          • Threshold‑based alerting for HDD temperature (warning/critical)
          • Pool and volume free‑space alarms with customizable thresholds
          • RAID degradation and failure detection
          • System‑wide temperature alarms using CPU and chassis sensors
          • Memory and CPU utilization alerts for performance diagnostics
          • Firmware update detection for maintenance planning

        Template Architecture:
          • Fully LLD‑driven storage and hardware monitoring — no manual configuration required
          • Clean separation of static system items and dynamic LLD components
          • Optimized polling intervals for performance‑critical vs. slow‑changing metrics
          • Native Zabbix valuemap support for RAID, PSU, UPS, fan, and health states
          • Consistent naming, tagging, and key structure for dashboards and filtering

        Intended Use:
          • Suitable for all QNAP NAS models supporting SNMP v2/v3
          • Designed for production environments requiring deep visibility into storage health,
            performance, and hardware reliability
          • Ideal for NOC teams, storage administrators, and environments with multiple QNAP units

        Compatibility:
          • Fully compatible with Zabbix 7.4
          • Validated for import and runtime behavior on Zabbix 8.x

      groups:
        - name: "Templates/Network devices"

      macros:
        - macro: "{$HDD_TEMPERATURE_WARNING}"
          value: "50"
        - macro: "{$HDD_TEMPERATURE_ALARM}"
          value: "60"
        - macro: "{$CPU_TEMPERATURE_ALARM}"
          value: "85"
        - macro: "{$SYSTEM_TEMPERATURE_ALARM}"
          value: "70"
        - macro: "{$POOL_SIZE_ALARM}"
          value: "20"
        - macro: "{$MEMORY_FREE_ALARM}"
          value: "10"
        - macro: "{$TEMP_CPU_GROUP}"
          value: "CPU"
        - macro: "{$TEMP_SYS_GROUP}"
          value: "System"
        - macro: "{$TEMP_HDD_GROUP}"
          value: "HDD"

      items:
        - uuid: e64e82d558974465afe739223978ffd1
          name: "CPU temperature"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.5.0
          key: qnap.cpu.temp.legacy
          delay: 60s
          units: C
          tags:
            - { tag: component, value: system }

        - uuid: a7a4f77534aa46e2a25ba5be691a4103
          name: "CPU: Temperature"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.24681.1.4.1.1.1.1.4.2.0
          key: qnap.cpu.temp
          delay: 30m
          units: C
          tags:
            - { tag: component, value: system }
          triggers:
            - uuid: e75a7e201e484aacb3decbce3d37bdac
              name: "System: High temperature detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.cpu.temp)>{$SYSTEM_TEMPERATURE_ALARM}"
              priority: HIGH
              tags:
                - { tag: component, value: temperature }
                - { tag: scope, value: availability }

        - uuid: 7842ef24c95a40d199583ff2ff605281
          name: "CPU: Usage"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.1.0
          key: qnap.cpu.usage
          delay: 60s
          units: "%"
          tags:
            - { tag: component, value: system }
          triggers:
            - uuid: 86e2a82bc61c46538284a7f395006b51
              name: "System: CPU usage is too high"
              expression: "last(/QNAP NAS LLD SNMP/qnap.cpu.usage)>90"
              priority: WARNING
              tags:
                - { tag: component, value: cpu }
                - { tag: scope, value: performance }

        - uuid: 803123f2121b4d2ab686692130b327a0
          name: "CPU: Load average (1m)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.3.10.1.0"
          key: qnap.cpu.load1
          delay: 1m
          tags:
            - { tag: component, value: cpu }

        - uuid: 3bd647b4eb6e4b549e0ad913fbee4556
          name: "CPU: Load average (5m)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.3.10.2.0"
          key: qnap.cpu.load5
          delay: 1m
          tags:
            - { tag: component, value: cpu }

        - uuid: f856613c78214f09a3fb43517b88c04a
          name: "CPU: Load average (15m)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.3.10.3.0"
          key: qnap.cpu.load15
          delay: 1m
          tags:
            - { tag: component, value: cpu }

        - uuid: 2a7f02cdbbb94301a719d3d47aba86cb
          name: "System: Total memory"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.2.0
          key: qnap.mem.total
          delay: 1h
          units: B
          tags:
            - { tag: component, value: system }

        - uuid: 4e46ef6fe0d24f49968a526a6782c428
          name: "System: Free memory"
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.24681.1.3.3.0
          key: qnap.mem.free
          delay: 60s
          units: B
          preprocessing:
            - { type: MULTIPLIER, parameters: ["1000"] }
          tags:
            - { tag: component, value: system }

        - uuid: e084f51d49724f53915ee24fafe46176
          name: "System: Free memory (%)"
          type: CALCULATED
          key: qnap.mem.free.pct
          delay: 60s
          value_type: FLOAT
          units: "%"
          params: "last(//qnap.mem.free)/(last(//qnap.mem.total)/100)"
          tags:
            - { tag: component, value: system }
          triggers:
            - uuid: 3f70a1a09a3c4d32bbc9c2b6ccf78b73
              name: "System: Free memory is too low"
              expression: "last(/QNAP NAS LLD SNMP/qnap.mem.free.pct)<{$MEMORY_FREE_ALARM}"
              priority: WARNING
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: capacity }

        - uuid: 36cfce1050a44ecfbcfd2eebb64f1570
          name: "NVMe Cache: Health status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.50.1.1.0"
          key: qnap.nvme.health
          delay: 5m
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: nvme }
            - { tag: component, value: cache }
          triggers:
            - uuid: 475ff9f9177947f6a9d0952f189d29f8
              name: "NVMe Cache: Health issue detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.nvme.health)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: nvme }
                - { tag: scope, value: availability }

        - uuid: 7a94f638e8504952893f46209e2f4512
          name: "SSD Cache: Wear level (%)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.50.2.1.0"
          key: qnap.ssd.wear
          delay: 10m
          units: "%"
          tags:
            - { tag: component, value: ssd }
            - { tag: component, value: cache }
          triggers:
            - uuid: 063273376dda4d7a9f9a196e756b60bc
              name: "SSD Cache: Wear level critical"
              expression: "last(/QNAP NAS LLD SNMP/qnap.ssd.wear)>80"
              priority: HIGH
              tags:
                - { tag: component, value: ssd }
                - { tag: scope, value: capacity }

        - uuid: 39d1df742346484da6828fdbb3dfa493
          name: "Snapshots: Space used (%)"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.80.1.1.0"
          key: qnap.snapshots.used.pct
          delay: 10m
          units: "%"
          tags:
            - { tag: component, value: snapshot }
            - { tag: component, value: storage }
          triggers:
            - uuid: dee364c810d84e14a0583e58a8cd383e
              name: "Snapshots: Space usage high"
              expression: "last(/QNAP NAS LLD SNMP/qnap.snapshots.used.pct)>80"
              priority: HIGH
              tags:
                - { tag: component, value: snapshot }
                - { tag: scope, value: capacity }

        - uuid: 107f30d0295f427f8f3374f4d99c2e18
          name: "Replication: Last job status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.100.1.1.0"
          key: qnap.replication.status
          delay: 10m
          valuemap:
            name: "Alarm state"
          tags:
            - { tag: component, value: replication }
            - { tag: component, value: backup }
          triggers:
            - uuid: 14e78c20ee9c4c2a9776a4c4d984a7a2
              name: "Replication: Last job failed"
              expression: "last(/QNAP NAS LLD SNMP/qnap.replication.status)=2"
              priority: HIGH
              tags:
                - { tag: component, value: replication }
                - { tag: scope, value: availability }

        - uuid: 042feb89d0a84471b56273f6ecd76f68
          name: "Antivirus: Engine status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.110.1.1.0"
          key: qnap.antivirus.status
          delay: 10m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: antivirus }
            - { tag: component, value: security }
          triggers:
            - uuid: 9f075936fbde4db8b19dbd4b36fa4450
              name: "Antivirus: Engine is disabled"
              expression: "last(/QNAP NAS LLD SNMP/qnap.antivirus.status)=0"
              priority: WARNING
              tags:
                - { tag: component, value: antivirus }
                - { tag: scope, value: security }

        - uuid: d7cdeec72509409a83f554f35bda0ddc
          name: "BBU: Status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.50.3.1.0"
          key: qnap.bbu.status
          delay: 5m
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: bbu }
            - { tag: component, value: cache }
          triggers:
            - uuid: 62b52ffe3ed044f7895d73feb41fb3ab
              name: "BBU: Failure detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.bbu.status)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: bbu }
                - { tag: scope, value: availability }

        - uuid: cc1fa5918a65409db64b7cced02c6a93
          name: "System: Uptime"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.25.1.1.0
          key: qnap.system.uptime
          delay: 60s
          units: uptime
          preprocessing:
            - { type: MULTIPLIER, parameters: ["0.01"] }
          tags:
            - { tag: component, value: system }

        - uuid: 4d0e4f136cd94f6489182a861cbfef1c
          name: "System: Hostname"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.4.0
          key: qnap.system.hostname
          delay: 2h
          value_type: TEXT
          inventory_link: NAME
          tags:
            - { tag: component, value: system }

        - uuid: 0e898d890ac740af9bb747ed73404540
          name: "System: Serial no."
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.5.0
          key: qnap.system.serial
          delay: 2h
          value_type: TEXT
          inventory_link: SERIALNO_A
          tags:
            - { tag: component, value: system }

        - uuid: 264de4e4acc24dd98749fc797a190a3f
          name: "System: Firmware version"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.6.0
          key: qnap.system.fw.version
          value_type: TEXT
          inventory_link: SERIALNO_B
          tags:
            - { tag: component, value: system }

        - uuid: cc3f2780e46e42df94e1fda63e111b8b
          name: "System: Firmware update available"
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.55062.1.12.7.0
          key: qnap.system.fw.update.available
          delay: 1h
          valuemap:
            name: "Firmware Version Available"
          tags:
            - { tag: component, value: system }
            - { tag: component, value: health }
          triggers:
            - uuid: 1a0992ec7fbb4a3ab86d8c641f80f760
              name: "System: Firmware update available"
              expression: "last(/QNAP NAS LLD SNMP/qnap.system.fw.update.available)=1"
              priority: INFO
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: maintenance }

        - uuid: 133f619e7b694ad0a36f40b2f6b7413d
          name: "Security: Firmware integrity status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.40.2.1.0"
          key: qnap.security.fw.integrity
          delay: 1h
          valuemap:
            name: "Health Status"
          tags:
            - { tag: component, value: security }
            - { tag: component, value: firmware }
          triggers:
            - uuid: bba7b42911dd499cb9fc861868dd6327
              name: "Security: Firmware integrity issue detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.security.fw.integrity)<>1"
              priority: HIGH
              tags:
                - { tag: component, value: security }
                - { tag: scope, value: integrity }

        - uuid: efebf11efc5f486dabecb5a045329ffb
          name: "SNMP agent availability"
          type: INTERNAL
          key: "zabbix[host,snmp,available]"
          history: 7d
          tags:
            - { tag: component, value: availability }
            - { tag: component, value: health }
          triggers:
            - uuid: fa6ecfbc30b94c3a9e8d981dfc3b6911
              name: "System: SNMP agent is unavailable"
              expression: "last(/QNAP NAS LLD SNMP/zabbix[host,snmp,available])=0"
              priority: HIGH
              tags:
                - { tag: component, value: availability }
                - { tag: scope, value: connectivity }

        - uuid: 5b0395c7e75f4c7c86f92133b96a99de
          name: "Service: SMB status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.1.0"
          key: qnap.service.smb
          delay: 5m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: service }
            - { tag: service, value: smb }
          triggers:
            - uuid: d30bd6676ad14e8ab54a2d1b5e2dd9a4
              name: "Service: SMB is down"
              expression: "last(/QNAP NAS LLD SNMP/qnap.service.smb)=0"
              priority: HIGH
              tags:
                - { tag: component, value: service }
                - { tag: scope, value: availability }

        - uuid: 813682d5ad5747b8a3bbe61b1dea5559
          name: "Service: AFP status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.2.0"
          key: qnap.service.afp
          delay: 5m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: service }
            - { tag: service, value: afp }

        - uuid: 5c4f8330c95f4f98b69aa182a88711a7
          name: "Service: NFS status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.3.0"
          key: qnap.service.nfs
          delay: 5m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: service }
            - { tag: service, value: nfs }
          triggers:
            - uuid: c517fb796cb44f1ea77dfed63bb4e154
              name: "Service: NFS is down"
              expression: "last(/QNAP NAS LLD SNMP/qnap.service.nfs)=0"
              priority: HIGH
              tags:
                - { tag: component, value: service }
                - { tag: scope, value: availability }

        - uuid: b2d636fcae2146e9809e6c602437b970
          name: "Service: FTP status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.4.0"
          key: qnap.service.ftp
          delay: 5m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: service }
            - { tag: service, value: ftp }
          triggers:
            - uuid: 19d06efc66344011aa8e001946ac2956
              name: "Service: FTP is down"
              expression: "last(/QNAP NAS LLD SNMP/qnap.service.ftp)=0"
              priority: WARNING
              tags:
                - { tag: component, value: service }
                - { tag: scope, value: availability }

        - uuid: 378a345ea45448e081c6e25b14289ffa
          name: "Service: SSH status"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.20.1.5.0"
          key: qnap.service.ssh
          delay: 5m
          valuemap:
            name: "System On/Off"
          tags:
            - { tag: component, value: service }
            - { tag: service, value: ssh }
          triggers:
            - uuid: f23505da5ebb4d73b8c27c5b44edbc15
              name: "Service: SSH is down"
              expression: "last(/QNAP NAS LLD SNMP/qnap.service.ssh)=0"
              priority: HIGH
              tags:
                - { tag: component, value: service }
                - { tag: scope, value: availability }

        - uuid: cc1df56c006d401ba0cd0090d8c56ad6
          name: "System: Event log error count"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.30.1.1.0"
          key: qnap.system.event.errors
          delay: 10m
          tags:
            - { tag: component, value: system }
            - { tag: component, value: health }
          triggers:
            - uuid: 6290560509d34f65893ff1d212f9d367
              name: "System: New error events detected"
              expression: "change(/QNAP NAS LLD SNMP/qnap.system.event.errors)>0"
              priority: WARNING
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: health }

        - uuid: d233a998cfce432cbf7060080a6a3a67
          name: "Security: Failed login attempts"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.40.1.1.0"
          key: qnap.security.failed.logins
          delay: 5m
          tags:
            - { tag: component, value: security }
            - { tag: scope, value: authentication }
          triggers:
            - uuid: c9f3178053fe4319bb87e34afcdd7a3c
              name: "Security: Excessive failed login attempts detected"
              expression: "change(/QNAP NAS LLD SNMP/qnap.security.failed.logins)>5"
              priority: HIGH
              tags:
                - { tag: component, value: security }
                - { tag: scope, value: intrusion }

        - uuid: bb0db13a840049a69d441a48a4907673
          name: "System: Last boot time"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.2.1.25.1.1.0"
          key: qnap.system.lastboot
          delay: 10m
          units: uptime
          preprocessing:
            - { type: MULTIPLIER, parameters: ["0.01"] }
          tags:
            - { tag: component, value: system }
            - { tag: component, value: health }
          triggers:
            - uuid: e2eda29350d04490bd70518ab895b219
              name: "System: Unexpected reboot detected"
              expression: "change(/QNAP NAS LLD SNMP/qnap.system.lastboot)<0"
              priority: WARNING
              tags:
                - { tag: component, value: system }
                - { tag: scope, value: availability }

        - uuid: 1ea1f7bee1424955a8407efa17d69228
          name: "Security: Malware scan result"
          type: SNMP_AGENT
          snmp_oid: "1.3.6.1.4.1.55062.1.40.3.1.0"
          key: qnap.security.malware.scan
          delay: 1h
          valuemap:
            name: "Alarm state"
          tags:
            - { tag: component, value: security }
            - { tag: component, value: antivirus }
          triggers:
            - uuid: 5f0aac4f9f264c669227e3c3483e90fc
              name: "Security: Malware detected"
              expression: "last(/QNAP NAS LLD SNMP/qnap.security.malware.scan)=2"
              priority: DISASTER
              tags:
                - { tag: component, value: security }
                - { tag: scope, value: threat }

      discovery_rules:
        - uuid: 806b9add49e1409aa6111a43f08fc0ef
          name: "Network Interface LLD (IF-MIB)"
          type: SNMP_AGENT
          snmp_oid: "discovery[{#SNMPINDEX},1.3.6.1.2.1.2.2.1.1,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1]"
          key: if.discovery
          delay: 30m

          item_prototypes:
            - uuid: e475c87807df48d39315eb40c053e64e
              name: "Interface {#IFNAME}: Incoming traffic"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}"
              key: "if.in[{#IFNAME}]"
              delay: 1m
              units: bps
              preprocessing:
                - { type: CHANGE_PER_SECOND, parameters: [""] }
                - { type: MULTIPLIER, parameters: ["8"] }
              tags:
                - { tag: component, value: network }

            - uuid: e1a9c4b7d3f84a1c9b7e2d6f5c3a8e10
              name: "Interface {#IFNAME}: Outgoing traffic"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}"
              key: "if.out[{#IFNAME}]"
              delay: 1m
              units: bps
              preprocessing:
                - { type: CHANGE_PER_SECOND, parameters: [""] }
                - { type: MULTIPLIER, parameters: ["8"] }
              tags:
                - { tag: component, value: network }

            - uuid: d7e1b3c94f2a4e0c9a6d5f3b1c8e7a52
              name: "Interface {#IFNAME}: Operational status"
              type: SNMP_AGENT
              snmp_oid: "1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}"
              key: "if.status[{#IFNAME}]"
              delay: 1m
              valuemap:
